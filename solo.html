<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Quiz | Solo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen transition-colors duration-300" data-theme="default">
    <div class="pyro">
      <div class="before"></div>
      <div class="after"></div>
    </div>

    <div id="winner-modal" class="winner-modal">
      <div class="winner-content">
        <i class="ri-trophy-fill trophy-icon"></i>
        <h2 class="winner-title">Congratulations!</h2>
        <p>The winner is:</p>
        <div id="winner-team" class="winner-team">Team A</div>
        <div id="winner-score" class="winner-score">Score: 0</div>
        <button id="close-winner" class="close-winner">Play Again</button>
      </div>
    </div>

    <button id="end-quiz-btn" class="end-quiz-btn hidden">
      <i class="ri-flag-2-fill"></i>End Quiz & Show Winner
    </button>

    <div class="fixed top-4 left-4 z-50">
      <div class="relative">
        <button
          id="theme-toggle-btn"
          class="flex items-center px-4 py-2 bg-white rounded-lg border shadow-md text-slate-700 border-slate-200 hover:bg-slate-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-300"
        >
          <i class="mr-2 ri-palette-line"></i>
          Theme
        </button>
        <div
          id="theme-menu"
          class="hidden absolute left-0 mt-2 w-56 bg-white rounded-xl border shadow-xl border-slate-200"
        >
          <div class="p-3 space-y-2">
            <button class="theme-option" data-theme="default">
              <i class="mr-2 ri-contrast-2-line"></i>Default
            </button>
            <button class="theme-option" data-theme="ocean">
              <i class="mr-2 ri-water-flash-line"></i>Ocean
            </button>
            <button class="theme-option" data-theme="forest">
              <i class="mr-2 ri-plant-line"></i>Forest
            </button>
            <button class="theme-option" data-theme="sunset">
              <i class="mr-2 ri-sun-line"></i>Sunset
            </button>
            <button class="theme-option" data-theme="purple">
              <i class="mr-2 ri-moon-clear-line"></i>Purple Night
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="fixed inset-0 opacity-10" style="background: radial-gradient(circle at 50% -20%, var(--primary), transparent)"></div>

    <div class="flex justify-center items-center p-4 min-h-screen">
      <section class="relative p-8 w-full max-w-3xl rounded-3xl border shadow-xl backdrop-blur-sm bg-white/90 border-slate-200">
        <div class="overflow-hidden absolute top-0 left-0 w-full h-full rounded-3xl pointer-events-none z-0">
          <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-blue-300/10"></div>
          <div class="absolute -right-1/2 -bottom-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-cyan-300/10"></div>
        </div>

        <div class="relative z-10">
          <div class="mb-5 text-center">
            <h3 class="mb-2 text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-500">
              College Of Computer Science and Information Technology
            </h3>
          </div>

          <div class="flex justify-between p-6 mb-8 rounded-2xl border shadow-sm scores bg-slate-100/70 border-slate-200">
            <div class="relative team-score team-a">
              <div class="flex justify-between items-center mb-4">
                <h3 class="flex items-center text-lg text-cyan-600">
                  <i class="mr-2 ri-team-fill"></i><span id="team-a-name">Team A</span>
                </h3>
                <button
                  id="team-a-theme-btn"
                  class="flex items-center px-3 py-1 text-sm bg-white rounded-lg border shadow-sm theme-btn border-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-300"
                >
                  <i class="mr-2 ri-palette-line"></i>
                  Theme: <span class="ml-1 team-a-theme-indicator">default</span>
                </button>
              </div>
              <div
                id="team-a-theme-menu"
                class="hidden absolute mt-2 w-48 bg-white rounded-xl border shadow-xl theme-menu border-slate-200"
                data-team="teamA"
              >
                <div class="p-2 space-y-1">
                  <button class="theme-option" data-theme="default"><i class="mr-2 ri-contrast-2-line"></i>Default</button>
                  <button class="theme-option" data-theme="ocean"><i class="mr-2 ri-water-flash-line"></i>Ocean</button>
                  <button class="theme-option" data-theme="forest"><i class="mr-2 ri-plant-line"></i>Forest</button>
                  <button class="theme-option" data-theme="sunset"><i class="mr-2 ri-sun-line"></i>Sunset</button>
                  <button class="theme-option" data-theme="purple"><i class="mr-2 ri-moon-clear-line"></i>Purple Night</button>
                </div>
              </div>
              <span id="team-a-score" class="text-4xl font-bold text-slate-800">0</span>
            </div>

            <div class="self-center px-6 py-3 text-blue-600 bg-blue-50 rounded-full border border-blue-100 vs-badge">
              <span class="font-semibold">VS</span>
            </div>

            <div class="relative text-right team-score team-b">
              <div class="flex justify-between items-center mb-4">
                <button
                  id="team-b-theme-btn"
                  class="flex items-center px-3 py-1 text-sm bg-white rounded-lg border shadow-sm theme-btn border-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-300"
                >
                  <i class="mr-2 ri-palette-line"></i>
                  Theme: <span class="ml-1 team-b-theme-indicator">default</span>
                </button>
                <h3 class="flex items-center text-lg text-blue-600">
                  <span id="team-b-name">Team B</span><i class="ml-2 ri-team-fill"></i>
                </h3>
              </div>
              <div
                id="team-b-theme-menu"
                class="hidden absolute mt-2 w-48 bg-white rounded-xl border shadow-xl theme-menu border-slate-200"
                data-team="teamB"
              >
                <div class="p-2 space-y-1">
                  <button class="theme-option" data-theme="default"><i class="mr-2 ri-contrast-2-line"></i>Default</button>
                  <button class="theme-option" data-theme="ocean"><i class="mr-2 ri-water-flash-line"></i>Ocean</button>
                  <button class="theme-option" data-theme="forest"><i class="mr-2 ri-plant-line"></i>Forest</button>
                  <button class="theme-option" data-theme="sunset"><i class="mr-2 ri-sun-line"></i>Sunset</button>
                  <button class="theme-option" data-theme="purple"><i class="mr-2 ri-moon-clear-line"></i>Purple Night</button>
                </div>
              </div>
              <span id="team-b-score" class="text-4xl font-bold text-slate-800">0</span>
            </div>
          </div>

          <div class="space-y-6 quiz-container">
            <h3
              id="question"
              class="p-6 mb-8 text-2xl rounded-2xl border shadow-sm text-slate-800 bg-white/80 question-text border-slate-200"
            ></h3>
            <div id="answer-buttons" class="grid grid-cols-1 gap-4 md:grid-cols-2"></div>
            <button
              id="next-btn"
              class="hidden py-4 mt-8 w-full font-semibold text-white bg-gradient-to-r from-blue-500 to-cyan-500 rounded-xl transition-all duration-300 transform hover:scale-105 hover:shadow-lg hover:shadow-blue-500/25"
            ></button>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
