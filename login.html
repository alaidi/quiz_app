<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen transition-colors duration-300" data-theme="default">
    <div class="fixed inset-0 opacity-10" style="background: radial-gradient(circle at 50% -20%, var(--primary), transparent)"></div>

    <div class="flex justify-center items-center p-4 min-h-screen">
      <section class="relative p-8 w-full max-w-md rounded-3xl border shadow-xl backdrop-blur-sm bg-white/90 border-slate-200">
        <div class="overflow-hidden absolute top-0 left-0 z-0 w-full h-full rounded-3xl pointer-events-none">
          <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-blue-300/10"></div>
          <div class="absolute -right-1/2 -bottom-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-cyan-300/10"></div>
        </div>

        <div class="relative z-10">
          <div class="mb-6 text-center">
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Login</h1>
            <p class="mt-2 text-slate-600">Enter the admin credentials to continue.</p>
          </div>

          <form id="login-form" class="space-y-4">
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Username</label>
              <input
                id="username"
                autocomplete="username"
                class="px-4 py-3 w-full bg-white rounded-xl border shadow-sm border-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-300"
              />
            </div>
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Password</label>
              <input
                id="password"
                type="password"
                autocomplete="current-password"
                class="px-4 py-3 w-full bg-white rounded-xl border shadow-sm border-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-300"
              />
            </div>

            <p id="error" class="hidden text-sm font-semibold text-red-600"></p>

            <button
              id="submit"
              type="submit"
              class="py-3.5 w-full font-semibold text-white bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl transition-all hover:from-blue-700 hover:to-cyan-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-300"
            >
              Sign in
            </button>
          </form>

          <div class="mt-6">
            <a href="/index.html" class="inline-flex gap-2 items-center text-sm font-semibold text-slate-700 hover:text-slate-900">
              <i class="ri-arrow-left-line"></i>Back
            </a>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/login.js"></script>
  </body>
</html>
