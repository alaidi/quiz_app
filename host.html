<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | Host</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen transition-colors duration-300" data-theme="default">
    <div class="fixed inset-0 opacity-10" style="background: radial-gradient(circle at 50% -20%, var(--primary), transparent)"></div>

    <div class="flex justify-center items-center p-4 min-h-screen">
      <section class="relative p-8 w-full max-w-4xl rounded-3xl border shadow-xl backdrop-blur-sm bg-white/90 border-slate-200">
        <div class="overflow-hidden absolute top-0 left-0 w-full h-full rounded-3xl pointer-events-none z-0">
          <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-blue-300/10"></div>
          <div class="absolute -right-1/2 -bottom-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-cyan-300/10"></div>
        </div>

        <div class="relative z-10">
          <div class="flex flex-col gap-3 justify-between items-start mb-6 sm:flex-row sm:items-center">
            <div>
              <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Host Screen</h1>
              <p class="mt-1 text-slate-600">Share the room code with the two team devices.</p>
            </div>
            <a href="/index.html" class="px-4 py-2 font-semibold rounded-xl border border-slate-200 bg-white hover:bg-slate-50">
              Back
            </a>
          </div>

          <div class="grid grid-cols-1 gap-4 mb-6 md:grid-cols-3">
            <div class="p-5 rounded-2xl border border-slate-200 bg-white/80">
              <div class="text-sm font-semibold text-slate-700">Room</div>
              <div class="flex items-center gap-3 mt-2">
                <div id="room-code" class="text-3xl font-extrabold tracking-widest text-slate-900">----</div>
                <button id="copy-room" class="px-3 py-2 text-sm font-semibold rounded-xl border border-slate-200 bg-white hover:bg-slate-50">
                  Copy
                </button>
              </div>
              <div id="room-links" class="mt-3 text-sm text-slate-600"></div>
              <p id="host-error" class="hidden mt-3 text-sm font-medium text-red-600"></p>
            </div>

            <div class="p-5 rounded-2xl border border-slate-200 bg-white/80">
              <div class="text-sm font-semibold text-slate-700">Teams</div>
              <div class="mt-3 grid grid-cols-2 gap-3">
                <div class="p-3 rounded-xl border border-slate-200 bg-white">
                  <div class="text-xs font-semibold text-slate-500">Team A</div>
                  <div id="team-a-status" class="mt-1 text-sm font-semibold text-slate-800">Not connected</div>
                  <div id="team-a-sub" class="mt-1 text-xs text-slate-500">Not submitted</div>
                </div>
                <div class="p-3 rounded-xl border border-slate-200 bg-white">
                  <div class="text-xs font-semibold text-slate-500">Team B</div>
                  <div id="team-b-status" class="mt-1 text-sm font-semibold text-slate-800">Not connected</div>
                  <div id="team-b-sub" class="mt-1 text-xs text-slate-500">Not submitted</div>
                </div>
              </div>
            </div>

            <div class="p-5 rounded-2xl border border-slate-200 bg-white/80">
              <div class="text-sm font-semibold text-slate-700">Controls</div>
              <div class="mt-3 grid grid-cols-2 gap-3">
                <button id="btn-start" class="py-2.5 font-semibold text-white rounded-xl bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600">
                  Start
                </button>
                <button id="btn-reveal" class="py-2.5 font-semibold text-white rounded-xl bg-gradient-to-r from-slate-700 to-slate-900 hover:from-slate-800 hover:to-slate-950">
                  Reveal
                </button>
                <button id="btn-next" class="py-2.5 font-semibold text-white rounded-xl bg-gradient-to-r from-indigo-600 to-purple-500 hover:from-indigo-700 hover:to-purple-600">
                  Next
                </button>
                <button id="btn-reset" class="py-2.5 font-semibold rounded-xl border border-slate-200 bg-white hover:bg-slate-50">
                  Reset
                </button>
              </div>
            </div>
          </div>

          <div class="p-6 rounded-2xl border shadow-sm bg-white/80 border-slate-200">
            <div class="flex flex-wrap gap-3 justify-between items-center">
              <div class="text-sm font-medium text-slate-500"><span id="q-progress">Waiting…</span></div>
              <div class="flex items-center gap-4">
                <div class="text-sm font-semibold text-slate-700">A: <span id="score-a">0</span></div>
                <div class="text-sm font-semibold text-slate-700">B: <span id="score-b">0</span></div>
              </div>
            </div>
            <div class="mt-4 h-2 rounded-full bg-slate-200 overflow-hidden">
              <div id="bar" class="h-full bg-gradient-to-r from-blue-600 to-cyan-500" style="width: 0%"></div>
            </div>

            <div class="mt-6">
              <div id="question" class="text-2xl font-semibold leading-snug text-slate-900">Create a room to begin.</div>
              <div id="reveal" class="hidden mt-4 p-4 rounded-xl border border-slate-200 bg-white"></div>
            </div>
          </div>

          <div id="summary" class="hidden mt-6"></div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/host.js"></script>
  </body>
</html>
