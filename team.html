<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | Team</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen transition-colors duration-300" data-theme="default">
    <div class="fixed inset-0 opacity-10" style="background: radial-gradient(circle at 50% -20%, var(--primary), transparent)"></div>

    <div class="flex justify-center items-center p-4 min-h-screen">
      <section class="relative p-8 w-full max-w-xl rounded-3xl border shadow-xl backdrop-blur-sm bg-white/90 border-slate-200">
        <div class="overflow-hidden absolute top-0 left-0 w-full h-full rounded-3xl pointer-events-none z-0">
          <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-blue-300/10"></div>
          <div class="absolute -right-1/2 -bottom-1/2 w-full h-full bg-gradient-to-br to-transparent rotate-45 from-cyan-300/10"></div>
        </div>

        <div class="relative z-10">
          <div class="flex justify-between items-center mb-6">
            <div>
              <h1 id="title" class="text-2xl font-extrabold tracking-tight text-slate-900">Team</h1>
              <p id="status" class="mt-1 text-slate-600">Connecting…</p>
            </div>
            <a href="/index.html" class="px-4 py-2 font-semibold rounded-xl border border-slate-200 bg-white hover:bg-slate-50">
              Back
            </a>
          </div>

          <div id="error" class="hidden p-4 mb-4 rounded-xl border border-red-200 bg-red-50 text-red-700 font-semibold"></div>

          <div class="p-6 rounded-2xl border shadow-sm bg-white/80 border-slate-200">
            <div class="flex justify-between items-center text-sm text-slate-500">
              <span id="progress">Waiting…</span>
              <span class="font-semibold text-slate-700">Score: <span id="score">0</span></span>
            </div>
            <div class="mt-4 h-2 rounded-full bg-slate-200 overflow-hidden">
              <div id="bar" class="h-full bg-gradient-to-r from-blue-600 to-cyan-500" style="width: 0%"></div>
            </div>

            <div class="mt-6">
              <div id="question" class="text-xl font-semibold leading-snug text-slate-900">Waiting for host…</div>
              <div id="answers" class="grid grid-cols-1 gap-3 mt-5"></div>
              <button
                id="submit-answer"
                class="py-3.5 mt-4 w-full font-semibold text-white bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl transition-all hover:from-blue-700 hover:to-cyan-600 disabled:opacity-60 disabled:cursor-not-allowed"
                disabled
              >
                <i class="mr-2 ri-check-line"></i>Submit Answer
              </button>
              <div id="submitted" class="hidden mt-4 text-sm font-semibold text-slate-700">Submitted. Waiting…</div>
              <div id="result" class="hidden mt-4 p-4 rounded-xl border border-slate-200 bg-white"></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/team.js"></script>
  </body>
</html>
